<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>act-flexi overlay</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html, body { width: 100%; height: 100%; background: rgba(0,0,0,0); overflow: hidden; }
    body { font-family: 'Segoe UI', system-ui, sans-serif; }
    #app { width: 100%; height: 100%; }
  </style>
  <!-- OverlayPlugin library -->
  <!-- ACT loads overlays via OverlayPlugin.loadOverlay() which injects common.min.js -->
  <!-- For direct browser loading, commonJsLoader handles loading from CDN -->
</head>
<body>
  <div id="app"></div>
  <script type="module" src="/src/main.ts"></script>
</body>
</html>
